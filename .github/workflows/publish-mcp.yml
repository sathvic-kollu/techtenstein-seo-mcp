name: Publish to MCP Registry

# Fires when a git tag matching v* is pushed.
# Uses GitHub OIDC (no PAT, no secret) to authenticate to registry.modelcontextprotocol.io.
# Fully headless — the repo maintainer just pushes a tag.

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch: {}

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      id-token: write   # required for GitHub OIDC
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install mcp-publisher
        run: |
          set -e
          ARCH=$(uname -m | sed 's/x86_64/amd64/;s/aarch64/arm64/')
          OS=$(uname -s | tr '[:upper:]' '[:lower:]')
          curl -sL "https://github.com/modelcontextprotocol/registry/releases/latest/download/mcp-publisher_${OS}_${ARCH}.tar.gz" \
            | tar xz mcp-publisher
          sudo mv mcp-publisher /usr/local/bin/
          mcp-publisher --help

      - name: Login to MCP Registry via GitHub OIDC
        run: mcp-publisher login github-oidc

      - name: Publish server.json
        run: mcp-publisher publish

      - name: Verify published
        run: |
          set -e
          NAME=$(python3 -c "import json; print(json.load(open('server.json'))['name'])")
          echo "Verifying $NAME on registry..."
          sleep 5
          curl -sf "https://registry.modelcontextprotocol.io/v0.1/servers?search=${NAME}" | head -c 400
          echo ""
